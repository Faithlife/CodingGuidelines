name: Apply Repository Conventions

on:
  schedule:
  - cron: '54 9 * * 1-5'
  workflow_dispatch:
    inputs:
      conventions:
        type: string
        description: Optional convention names to add (space-delimited)
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    uses: Faithlife/CodingGuidelines/.github/workflows/repo-conventions-call.yml@master
    with:
      conventions: ${{ github.event.inputs.conventions || '' }}
    secrets: inherit
