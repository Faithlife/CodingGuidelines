# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Reusable workflow that applies repository conventions and opens a pull request when needed.
name: repo-conventions-call

on:
  workflow_call:
    inputs:
      runs-on:
        type: string
        description: The runner to use.
        required: false
        default: ubuntu-latest
    secrets:
      COPILOT_GITHUB_TOKEN:
        description: A GitHub.com PAT with access to GitHub Copilot.
        required: true
      GH_PR_WRITE_PAT:
        description: A GitHub.com PAT that has permission to create pull requests.
        required: true

defaults:
  run:
    shell: pwsh

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: repo-conventions
  cancel-in-progress: false

jobs:
  repo-conventions:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          # full history needed for git merge-base in repo-conventions tool
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@v5

      - name: Install Node.js
        uses: actions/setup-node@v6

      - name: Install Copilot
        run: npm install -g @github/copilot

      - name: Configure git
        run: |
          git config user.name 'logosghservice'
          git config user.email 'github.service@logos.com'

      - name: Apply repository conventions
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PR_WRITE_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # use `dnx repo-conventions --yes -- apply --open-pr` when .NET 8 is no longer supported
        run: |
          dotnet tool install -g repo-conventions
          repo-conventions apply --open-pr
