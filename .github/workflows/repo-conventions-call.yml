# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Reusable workflow that applies or adds repository conventions and opens a pull request when needed.
name: repo-conventions-call

on:
  workflow_call:
    inputs:
      runs-on:
        type: string
        description: The runner to use.
        required: false
        default: ubuntu-latest
      command:
        type: string
        description: The repo-conventions command to run.
        required: false
        default: apply
      repository:
        type: string
        description: The owner/name of the repository to update.
        required: false
        default: ""
      conventions:
        type: string
        description: Space-delimited convention package names to add.
        required: false
        default: ""
    secrets:
      COPILOT_GITHUB_TOKEN:
        description: A GitHub.com PAT with access to GitHub Copilot.
        required: true
      GH_PR_WRITE_PAT:
        description: A GitHub.com PAT that has permission to create pull requests.
        required: true

defaults:
  run:
    shell: pwsh

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: repo-conventions-${{ inputs.command }}-${{ inputs.repository || github.repository }}
  cancel-in-progress: false

jobs:
  repo-conventions:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository || github.repository }}
          token: ${{ secrets.GH_PR_WRITE_PAT }}
          # full history needed for git merge-base in repo-conventions tool
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@v5

      - name: Install Node.js
        uses: actions/setup-node@v6

      - name: Install APM
        uses: microsoft/apm-action@v1
        continue-on-error: true # until cli-only is supported

      - name: Install Copilot
        run: npm install -g @github/copilot

      - name: Configure git
        run: |
          git config user.name 'logosghservice'
          git config user.email 'github.service@logos.com'

      - name: Run repository conventions
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PR_WRITE_PAT }}
          GITHUB_TOKEN: ${{ inputs.repository == '' && secrets.GITHUB_TOKEN || secrets.GH_PR_WRITE_PAT }}
          REPO_CONVENTIONS_COMMAND: ${{ inputs.command }}
          REPO_CONVENTIONS_PACKAGES: ${{ inputs.conventions }}
        # use `dnx repo-conventions --yes -- <command> --open-pr` when .NET 8 is no longer supported
        run: |
          dotnet tool install -g repo-conventions

          if ($env:REPO_CONVENTIONS_COMMAND -eq 'apply') {
            repo-conventions apply --open-pr
          } elseif ($env:REPO_CONVENTIONS_COMMAND -eq 'add') {
            $packages = $env:REPO_CONVENTIONS_PACKAGES -split '\s+' | Where-Object { $_ }
            if (-not $packages) {
              throw 'At least one convention package name is required.'
            }

            repo-conventions add @packages --open-pr
          } else {
            throw "Unsupported repo-conventions command: $env:REPO_CONVENTIONS_COMMAND"
          }
