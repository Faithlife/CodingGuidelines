conventions:
  - path: ../gitattributes-section
    commit:
      message: Update .gitattributes for agentic-repo
    settings:
      name: agentic-repo
      text: |
        apm.lock.yaml linguist-generated=true
        .agents/** linguist-generated=true
        .github/agents/** linguist-generated=true
        .github/hooks/** linguist-generated=true
        .github/instructions/** linguist-generated=true
        .github/prompts/** linguist-generated=true
  - path: ../gitignore-section
    commit:
      message: Update .gitignore for agentic-repo
    settings:
      name: agentic-repo
      text: |
        apm_modules/
  - path: ../prettierignore-section
    commit:
      message: Update .prettierignore for agentic-repo
    settings:
      name: agentic-repo
      text: |
        .agents/
        .github/instructions/
        .github/lsp.json
        apm.lock.yaml
        apm.yml
        apm_modules/
  - path: ../apm
    settings:
      install: ${{ settings.apm-install }}
      update: true

pull-request:
  auto-merge: true
