conventions:
  - path: ../gitattributes-section
    settings:
      name: agentic-repo
      text: |
        apm.lock.yaml linguist-generated=true
        .agents/** linguist-generated=true
  - path: ../gitignore-section
    settings:
      name: agentic-repo
      text: |
        apm_modules/
        .apm-pin
  - path: ../prettierignore-section
    settings:
      name: agentic-repo
      text: |
        .agents/
        apm.lock.yaml
        apm.yml
  - path: ../apm-install
