commit:
  message: Update .NET library props

conventions:
  - path: ../config-text-section
    settings:
      path: /Directory.Build.props
      name: faithlife-dotnet-library-props
      text: ${{ readText("files/properties.xml") }}
      comment-prefix: '<!--'
      comment-suffix: '-->'
  - path: ../config-text-section
    settings:
      path: /Directory.Packages.props
      name: faithlife-dotnet-library-props/properties
      text: ${{ readText("files/package-properties.xml") }}
      comment-prefix: '<!--'
      comment-suffix: '-->'
  - path: ../config-text-section
    settings:
      path: /Directory.Packages.props
      name: faithlife-dotnet-library-props/analyzers
      text: ${{ readText("files/analyzers.xml") }}
      comment-prefix: '<!--'
      comment-suffix: '-->'
