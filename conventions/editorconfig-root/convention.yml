commit:
  message: "Update root .editorconfig"

conventions:
  - path: ../editorconfig-section
    settings:
      name: root
      text: |
        root = true

        [*]
        charset = utf-8
        end_of_line = lf
        trim_trailing_whitespace = true
      remove-root-rules:
        - indent_size
        - indent_style
        - tab_width
        - insert_final_newline