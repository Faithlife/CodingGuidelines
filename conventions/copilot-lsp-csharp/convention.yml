commit:
  message: Update LSP server for C#

conventions:
  - path: ../copilot-lsp
    settings:
      servers:
        csharp:
          command: dnx
          args: [roslyn-language-server, --yes, --prerelease, --, --stdio, --autoLoadProjects]
          cwd: ${PLUGIN_ROOT}
          fileExtensions:
            .cs: csharp
            .razor: aspnetcorerazor
            .cshtml: aspnetcorerazor
          warmupTimeoutMs: 120000
