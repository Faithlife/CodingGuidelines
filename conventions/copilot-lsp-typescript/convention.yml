commit:
  message: Update LSP server for TypeScript

conventions:
  - path: ../copilot-lsp
    settings:
      servers:
        typescript:
          command: npx
          args: [-y, typescript-language-server, --stdio]
          fileExtensions:
            .ts: typescript
            .tsx: typescriptreact
            .js: javascript
            .jsx: javascriptreact
